<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fungus</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap");
    :root {
      --bg: #0a0a0d; --text: #f5f7ff; --muted: #b5bbd6; --line: #232337; --accent: #86ffd1;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; color: var(--text); line-height: 1.65; font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at 10% 0%, #1a1b2d 0%, var(--bg) 42%);
    }
    a { color: var(--text); text-decoration: none; }
    a:hover { color: var(--accent); }
    .container { width: min(1080px, 92vw); margin: 0 auto; }
    .site-header { position: sticky; top: 0; z-index: 20; backdrop-filter: blur(8px); background: rgba(10,10,13,.75); border-bottom: 1px solid var(--line); }
    .nav { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .brand { font-family: "JetBrains Mono", monospace; font-size: .9rem; color: var(--accent); }
    .brand::before { content: "kaylee_scanlin"; }
    .nav-links { display: flex; gap: 1.25rem; font-size: .95rem; }
    .active { color: var(--accent); }
    .hero { padding: 4rem 0 2rem; border-bottom: 1px solid var(--line); margin-bottom: 1.5rem; }
    h1 { margin: 0 0 0.8rem; font-size: clamp(2rem, 5vw, 3rem); }
    .t-body { color: var(--muted); }
    .gallery {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 1rem; padding-bottom: 2rem;
    }
    .gallery a {
      border: 1px solid var(--line); border-radius: 14px; overflow: hidden; display: block; background: #111118;
      transition: transform 140ms ease, border-color 140ms ease;
    }
    .gallery a:hover { transform: translateY(-3px); border-color: var(--accent); }
    .gallery img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .secret-fungus { color: var(--muted); text-align: center; margin: 0 0 1.8rem; font-size: 0.9rem; }
    @media (max-width: 720px) {
      .nav { flex-direction: column; align-items: flex-start; justify-content: center; padding: 0.7rem 0; }
    }
  </style>
</head>
